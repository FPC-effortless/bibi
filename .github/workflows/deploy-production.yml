name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '18'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Pre-deployment validation
  pre-deployment:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    
    outputs:
      deployment-environment: ${{ steps.set-env.outputs.environment }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set deployment environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
          fi
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run full test suite
        run: |
          npm run test -- --coverage --watchAll=false
          npm run test:user-flows:full
          
      - name: Build and validate
        run: |
          npm run build
          npm run validate:setup
          
      - name: Security audit
        run: npm audit --audit-level=moderate

  # Deploy to Vercel
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [pre-deployment]
    environment: ${{ needs.pre-deployment.outputs.deployment-environment }}
    
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        
      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=${{ needs.pre-deployment.outputs.deployment-environment }} --token=${{ secrets.VERCEL_TOKEN }}
        
      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        
      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${{ needs.pre-deployment.outputs.deployment-environment }}" = "production" ]; then
            URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

  # Post-deployment smoke tests
  smoke-tests:
    name: Post-deployment Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Wait for deployment
        run: sleep 30
        
      - name: Run smoke tests
        run: npm run test:user-flows:smoke
        env:
          TEST_URL: ${{ needs.deploy.outputs.deployment-url }}
          
      - name: Health check
        run: |
          curl -f ${{ needs.deploy.outputs.deployment-url }}/api/health || exit 1
          curl -f ${{ needs.deploy.outputs.deployment-url }}/api/status || exit 1

  # Performance validation
  performance-validation:
    name: Performance Validation
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Lighthouse audit on deployed site
        run: npm run audit:lighthouse
        env:
          LIGHTHOUSE_URL: ${{ needs.deploy.outputs.deployment-url }}
          
      - name: Performance budget validation
        run: npm run performance:budget
        env:
          TEST_URL: ${{ needs.deploy.outputs.deployment-url }}

  # Security validation
  security-validation:
    name: Security Validation
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Security headers check
        run: |
          curl -I ${{ needs.deploy.outputs.deployment-url }} | grep -i "strict-transport-security"
          curl -I ${{ needs.deploy.outputs.deployment-url }} | grep -i "x-frame-options"
          curl -I ${{ needs.deploy.outputs.deployment-url }} | grep -i "x-content-type-options"
          
      - name: SSL/TLS validation
        run: |
          echo | openssl s_client -servername $(echo ${{ needs.deploy.outputs.deployment-url }} | sed 's|https://||') -connect $(echo ${{ needs.deploy.outputs.deployment-url }} | sed 's|https://||'):443 2>/dev/null | openssl x509 -noout -dates

  # Deployment notification
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests, performance-validation, security-validation]
    if: always()
    
    steps:
      - name: Deployment success notification
        if: needs.deploy.result == 'success' && needs.smoke-tests.result == 'success'
        run: |
          echo "✅ Deployment successful!"
          echo "Environment: ${{ needs.pre-deployment.outputs.deployment-environment }}"
          echo "URL: ${{ needs.deploy.outputs.deployment-url }}"
          echo "Performance: ${{ needs.performance-validation.result }}"
          echo "Security: ${{ needs.security-validation.result }}"
          
      - name: Deployment failure notification
        if: needs.deploy.result == 'failure' || needs.smoke-tests.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo "Deploy status: ${{ needs.deploy.result }}"
          echo "Smoke tests: ${{ needs.smoke-tests.result }}"
          exit 1
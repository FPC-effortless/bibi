name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

env:
  NODE_VERSION: '18'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Staging deployment
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm run test -- --watchAll=false
        
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        
      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        
      - name: Build project artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        
      - name: Deploy to Vercel staging
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to staging: $URL"

  # Staging validation
  staging-validation:
    name: Staging Validation
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Wait for deployment
        run: sleep 20
        
      - name: Run staging smoke tests
        run: npm run test:user-flows:smoke
        env:
          TEST_URL: ${{ needs.deploy-staging.outputs.deployment-url }}
          
      - name: Quick performance check
        run: npm run audit:lighthouse
        env:
          LIGHTHOUSE_URL: ${{ needs.deploy-staging.outputs.deployment-url }}

  # PR comment with staging URL
  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    needs: [deploy-staging, staging-validation]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Staging Deployment Ready**
              
              **Preview URL:** ${{ needs.deploy-staging.outputs.deployment-url }}
              
              **Validation Status:**
              - Deployment: ✅ Success
              - Smoke Tests: ${{ needs.staging-validation.result == 'success' && '✅ Passed' || '❌ Failed' }}
              - Performance: ${{ needs.staging-validation.result == 'success' && '✅ Validated' || '⚠️ Check required' }}
              
              The staging environment is ready for review and testing.`
            })
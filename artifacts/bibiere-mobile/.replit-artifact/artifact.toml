kind = "mobile"
previewPath = "/bibiere-mobile/"
title = "bibiere Mobile"
version = "1.0.0"
id = "artifacts/bibiere-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/bibiere-mobile/" ]
localPort = 20219

[services.development]
run = "pnpm --filter @workspace/bibiere-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bibiere-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/bibiere-mobile", "run", "serve" ]

[services.env]
PORT = "20219"
BASE_PATH = "/bibiere-mobile/"
